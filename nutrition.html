<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutrition | Locked In</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%94%92%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Instrument+Sans:wght@500;600;700&display=swap" rel="stylesheet">

<body>
  <div class="shell">
    <div class="topbar">
      <a class="back-link" href="index.html">&larr; Locked In</a>
      <span class="week-badge" id="week-badge">WINTER 2026</span>

    <h1 class="page-title brand-navy">Nutrition</h1>

    <div class="tip-card navy-card" id="tip-card">
      <span class="tip-label">Your tip right now</span>
      <p class="tip-text" id="tip-text"></p>
      <span class="tip-cat" id="tip-cat"></span>
      <div class="tip-actions">
        <button class="btn btn-navy" id="another-btn" type="button">Give me another</button>
      </div>
    </div>

    <section class="quiz-block" id="quiz-block">
      <h2 class="quiz-heading">Make it personal</h2>
      <p class="quiz-sub">Four quick questions, under a minute. You get two tips built around your actual week. Nothing you answer leaves your phone.</p>

      <div id="quiz-area"></div>
    </section>
  </div>

  <footer class="site-foot">
    <p class="lock-line">FUEL THE SIX WEEKS 🔒</p>
  </footer>

  <script src="content.js"></script>
  <script src="app.js"></script>
  <script>
    renderWeekBadge();
    initTipPage(NUTRITION_TIPS, 'lockedin-nutrition-deck', true);
    initQuiz();
  </script>
